version: "3.9"

services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend, frontend]
    restart: always

  backend:
    build: ./backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on: [redis, ollama]
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  worker:
    build: ./backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on: [redis]
    restart: always
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    restart: always
    environment:
      - VITE_API_URL=http://localhost:8000

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=127.0.0.1:11434
    restart: always
    network_mode: host

  redis:
    image: redis:7.2-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --bind 127.0.0.1 --save 60 1

volumes:
  ollama_data:
